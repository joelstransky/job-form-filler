<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Job Application Form</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="url"], select, textarea { width: 100%; padding: 0.5rem; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; background: #007bff; color: white; border: none; cursor: pointer; }
    .section-title { margin-top: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Apply for Software Engineer</h1>
  <form id="jobForm" onsubmit="event.preventDefault(); alert('Submitted!');">
    
    <h2 class="section-title">Personal Information</h2>
    <div class="form-group">
      <label for="fname">First Name *</label>
      <input type="text" id="fname" name="fname" required>
    </div>
    
    <div class="form-group">
      <label for="last_name">Last Name *</label>
      <input type="text" id="last_name" name="surname" required>
    </div>

    <div class="form-group">
      <label for="email_addr">Email *</label>
      <input type="email" id="email_addr" name="contact_method_1" placeholder="Your best e-mail address" required>
    </div>

    <div class="form-group">
      <label>
        Phone Number
        <input type="tel" name="mobile">
      </label>
    </div>

    <div class="form-group">
      <label for="country_select">Country of Residence</label>
      <select id="country_select" name="country">
        <option value="">-- Select --</option>
        <option value="US">United States</option>
        <option value="UK">United Kingdom</option>
        <option value="CA">Canada</option>
        <option value="AU">Australia</option>
        <option value="FR">France</option>
        <option value="DE">Germany</option>
      </select>
    </div>

    <h2 class="section-title">Links & Portfolio</h2>
    <div class="form-group">
      <label for="lnk">LinkedIn Profile</label>
      <input type="text" id="lnk" name="linkedin_url">
    </div>

    <div class="form-group">
      <label for="gh">GitHub Profile</label>
      <input type="url" id="gh" name="github_url">
    </div>

    <div class="form-group">
      <label for="port">Personal Website</label>
      <input type="url" id="port" name="portfolio_url">
    </div>

    <h2 class="section-title">Demographics (Voluntary)</h2>
    <div class="form-group">
      <label for="gender_id">Gender</label>
      <select id="gender_id" name="gender">
        <option value="">-- Select --</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Non-binary">Non-binary</option>
        <option value="Decline">Decline to self-identify</option>
      </select>
    </div>

    <div class="form-group">
      <label for="hisp_ethnicity">Are you Hispanic/Latino?</label>
      <input type="text" id="hisp_ethnicity" name="hispanic" placeholder="Yes / No">
    </div>

    <div class="form-group">
      <label for="race_id">Please identify your race</label>
      <select id="race_id" name="race">
        <option value="">-- Select --</option>
        <option value="White">White</option>
        <option value="Black">Black</option>
        <option value="Asian">Asian</option>
        <option value="Other">Other / Decline</option>
      </select>
    </div>

    <div class="form-group">
      <label for="vet_status">Veteran Status</label>
      <select id="vet_status" name="veteran">
        <option value="">-- Select --</option>
        <option value="Protected Veteran">I am a protected veteran</option>
        <option value="Not a protected veteran">I am not a protected veteran</option>
        <option value="Decline">Decline to self-identify</option>
      </select>
    </div>

    <div class="form-group">
      <label for="disability_status">Voluntary Self-Identification of Disability</label>
      <input type="text" id="disability_status" name="disability">
    </div>

    <h2 class="section-title">Documents & Extras</h2>
    <div class="form-group">
      <label for="resume_upload">Resume/CV (File Upload) *</label>
      <input type="file" id="resume_upload" name="resume" required>
    </div>

    <div class="form-group">
      <label for="cover_upload">Cover Letter (File Upload)</label>
      <input type="file" id="cover_upload" name="cover_letter">
    </div>

    <div class="form-group">
      <label for="additional_info">Message to Hiring Manager (Special Field 1)</label>
      <textarea id="additional_info" name="message" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label for="ref_field">Professional References (Special Field 2)</label>
      <textarea id="ref_field" name="references" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label for="notes_field">Additional Notes (Special Field 3)</label>
      <textarea id="notes_field" name="notes" rows="2"></textarea>
    </div>

    <div class="form-group" style="margin-top: 1.5rem; background: #f9f9f9; padding: 1rem; border: 1px solid #eee;">
      <label style="font-weight: normal; display: flex; align-items: flex-start; gap: 0.5rem;">
        <input type="checkbox" name="gdpr_consent" required style="margin-top: 0.25rem;">
        <span>I consent to the processing and retention of my personal data for recruitment purposes (GDPR). *</span>
      </label>
    </div>

    <button type="submit" style="margin-top: 1rem;">Submit Application</button>
  </form>

  <p style="margin-top: 2rem; color: #555;">
    <strong>To test:</strong> Open this HTML file in Chrome, click the extension icon, and click "Auto-Fill Form". Make sure you have filled out your profile in the extension options first.
  </p>
</body>
</html>
