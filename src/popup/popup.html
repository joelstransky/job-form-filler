<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobForm AutoFill</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../options/options.css">
  <style>
    .section-box { background: rgba(31, 41, 55, 0.5); border: 1px solid #1f2937; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.75rem; }
    .file-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .file-row:last-child { margin-bottom: 0; }
    .file-label { color: #9ca3af; width: 60px; font-weight: 600; flex-shrink: 0; margin-right: 8px; }
    .file-name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f3f4f6; margin-right: 0.5rem; }
    input[type="file"] { display: none; }
    .icon-btn { cursor: pointer; font-size: 0.875rem; opacity: 0.6; transition: opacity 0.2s; flex-shrink: 0; }
    .icon-btn:hover { opacity: 1; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-gray-100 p-3 font-sans" style="width: 300px; min-width: 300px;">
  <div class="flex flex-col gap-3">
    
    <div class="text-center pb-2 border-b border-gray-800">
      <h1 class="text-lg font-bold text-white tracking-wide">JobForm AutoFill</h1>
      <p class="text-xs text-blue-400 font-medium">Application Assistant</p>
    </div>

    <button id="fillFormBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded transition-colors text-base border border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]">
      Auto-Fill Form
    </button>
    
    <div id="quickFilesContainer" class="section-box">
      <div class="file-row" id="row-resume">
        <span class="file-label">Resume:</span>
        <span id="resumeName" class="file-name" title="No file saved">None</span>
        <label for="resumeInput" class="icon-btn" title="Quick update Resume">🔄</label>
        <input type="file" id="resumeInput" accept=".pdf,.doc,.docx">
      </div>
      <div class="file-row" id="row-cover">
        <span class="file-label">Cover:</span>
        <span id="coverName" class="file-name" title="No file saved">None</span>
        <label for="coverInput" class="icon-btn" title="Quick update Cover Letter">🔄</label>
        <input type="file" id="coverInput" accept=".pdf,.doc,.docx">
      </div>
    </div>

    <div id="specialFieldsContainer" class="section-box">
      <div class="file-row" id="row-sf1">
        <span class="file-label" title="Special Field 1">SF 1:</span>
        <span id="sf1Name" class="file-name" title=""></span>
        <span class="icon-btn copy-btn" data-target="specialField1" title="Copy to clipboard">📋</span>
      </div>
      <div class="file-row" id="row-sf2">
        <span class="file-label" title="Special Field 2">SF 2:</span>
        <span id="sf2Name" class="file-name" title=""></span>
        <span class="icon-btn copy-btn" data-target="specialField2" title="Copy to clipboard">📋</span>
      </div>
      <div class="file-row" id="row-sf3">
        <span class="file-label" title="Special Field 3">SF 3:</span>
        <span id="sf3Name" class="file-name" title=""></span>
        <span class="icon-btn copy-btn" data-target="specialField3" title="Copy to clipboard">📋</span>
      </div>
    </div>

    <button id="optionsBtn" class="text-sm font-semibold text-gray-400 hover:text-white transition-colors bg-gray-900 border border-gray-800 hover:border-gray-600 rounded py-2 mt-1">Edit Profile</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
