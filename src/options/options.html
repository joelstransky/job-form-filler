<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobForm AutoFill - Options</title>
  <link rel="stylesheet" href="options.css">
  <style>
    h2 { margin-top: 1.5rem; font-size: 1.2rem; color: #444; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; }
    #clearBtn { background-color: #dc3545; margin-left: 10px; }
    #clearBtn:hover { background-color: #c82333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Profile Settings</h1>
    <form id="profileForm">
      <div class="grid">
        <div class="column">
          <h2>Basic Info</h2>
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email">
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone">
          </div>
          <div class="form-group">
            <label for="country">Country</label>
            <select id="country">
              <option value="">Select a country...</option>
            </select>
          </div>

          <h2>Links</h2>
          <div class="form-group">
            <label for="linkedin">LinkedIn URL</label>
            <input type="url" id="linkedin">
          </div>
          <div class="form-group">
            <label for="github">GitHub URL</label>
            <input type="url" id="github">
          </div>
          <div class="form-group">
            <label for="portfolio">Portfolio URL</label>
            <input type="url" id="portfolio">
          </div>
        </div>

        <div class="column">
          <h2>Demographics / Equal Opportunity</h2>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="">-- Select --</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Decline">Decline to self-identify</option>
            </select>
          </div>
          <div class="form-group">
            <label for="hispanic">Are you Hispanic/Latino?</label>
            <select id="hispanic">
              <option value="">-- Select --</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
              <option value="Decline">Decline to self-identify</option>
            </select>
          </div>
          <div class="form-group">
            <label for="race">Race</label>
            <select id="race">
              <option value="">-- Select --</option>
              <option value="White">White (Not Hispanic or Latino)</option>
              <option value="Black">Black or African American</option>
              <option value="Native Hawaiian">Native Hawaiian or Other Pacific Islander</option>
              <option value="Asian">Asian</option>
              <option value="Native American">American Indian or Alaska Native</option>
              <option value="Two or More">Two or More Races</option>
              <option value="Decline">Decline to self-identify</option>
            </select>
          </div>
          <div class="form-group">
            <label for="veteran">Veteran Status</label>
            <select id="veteran">
              <option value="">-- Select --</option>
              <option value="Yes">I identify as one or more of the classifications of a protected veteran</option>
              <option value="No">I am not a protected veteran</option>
              <option value="Decline">I don't wish to answer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="disability">Disability Status</label>
            <select id="disability">
              <option value="">-- Select --</option>
              <option value="Yes">Yes, I have a disability (or previously had a disability)</option>
              <option value="No">No, I don't have a disability</option>
              <option value="Decline">I don't wish to answer</option>
            </select>
          </div>

          <h2>Documents & Special Fields</h2>
          <div class="form-group">
            <label for="resumeFile">Resume (PDF, DOCX)</label>
            <input type="file" id="resumeFile" accept=".pdf,.doc,.docx">
            <small id="resumeStatus" style="color: #666; display: block; margin-top: 4px;"></small>
          </div>
          <div class="form-group">
            <label for="coverLetterFile">Cover Letter (File)</label>
            <input type="file" id="coverLetterFile" accept=".pdf,.doc,.docx">
            <small id="coverLetterFileStatus" style="color: #666; display: block; margin-top: 4px;"></small>
          </div>
          <div class="form-group">
            <label for="specialField1">Special Field 1 (e.g., Cover Letter text)</label>
            <textarea id="specialField1" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="specialField2">Special Field 2 (e.g., References)</label>
            <textarea id="specialField2" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="specialField3">Special Field 3 (e.g., Notes)</label>
            <textarea id="specialField3" rows="3"></textarea>
          </div>
        </div>
      </div>
      
      <div class="actions" style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px;">
        <button type="submit" id="saveBtn">Save Profile</button>
        <button type="button" id="clearBtn">Clear Data</button>
        <div id="status" class="status"></div>
      </div>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
